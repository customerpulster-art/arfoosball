<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Finger Soccer</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        .ui-container {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; gap: 20px; background: rgba(0,0,0,0.7);
            padding: 10px 20px; border-radius: 20px; color: white; font-weight: bold;
        }
        /* Video oculto para el procesamiento de MediaPipe */
        #webcam { display: none; }
    </style>
</head>
<body>

    <div class="ui-container">
        <div id="scoreP1">Jugador 1: 0</div>
        <div id="scoreP2">Jugador 2: 0</div>
    </div>

    <video id="webcam" autoplay playsinline></video>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        
        <a-marker type="hiro" id="cancha-marker">
            
            <a-box position="0 0 0" width="2" height="0.02" depth="3" color="#46a049"></a-box>
            <a-box position="0 0.01 0" width="2" height="0.01" depth="0.05" color="#ffffff"></a-box>
            
            <a-box position="-1 0.2 0" width="0.05" height="0.4" depth="3" color="rgba(255,255,255,0.3)" material="transparent: true; opacity: 0.4;"></a-box> <a-box position="1 0.2 0" width="0.05" height="0.4" depth="3" color="rgba(255,255,255,0.3)" material="transparent: true; opacity: 0.4;"></a-box>  <a-box position="-0.6 0.2 -1.5" width="0.8" height="0.4" depth="0.05" color="white"></a-box>
            <a-box position="0.6 0.2 -1.5" width="0.8" height="0.4" depth="0.05" color="white"></a-box>
            <a-box position="-0.6 0.2 1.5" width="0.8" height="0.4" depth="0.05" color="white"></a-box>
            <a-box position="0.6 0.2 1.5" width="0.8" height="0.4" depth="0.05" color="white"></a-box>

            <a-entity position="0 0.2 -1.5" id="porteria-p1">
                <a-box position="0 0.2 0" width="0.4" height="0.4" depth="0.05" color="#ff3333" material="wireframe: true"></a-box>
            </a-entity>
            <a-entity position="0 0.2 1.5" id="porteria-p2">
                <a-box position="0 0.2 0" width="0.4" height="0.4" depth="0.05" color="#3333ff" material="wireframe: true"></a-box>
            </a-entity>

            <a-sphere id="balon" position="0 0.1 0" radius="0.08" color="#ffffff" 
                      material="src: url(https://raw.githubusercontent.com/aframevr/aframe/master/examples/boilerplate/panorama/puydesancy.jpg); repeat: 2 2">
            </a-sphere>

            <a-cylinder id="player1-finger" position="0 0.1 1.2" radius="0.05" height="0.2" color="#0000ff"></a-cylinder>
            <a-cylinder id="player2-finger" position="0 0.1 -1.2" radius="0.05" height="0.2" color="#ff0000"></a-cylinder>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // --- VARIABLES DE JUEGO ---
        const balon = document.getElementById('balon');
        const p1Visual = document.getElementById('player1-finger');
        const p2Visual = document.getElementById('player2-finger');
        
        let score1 = 0, score2 = 0;
        
        // Físicas del balón
        let ballPos = { x: 0, z: 0 };
        let ballVel = { x: 0, z: 0 };
        const radioBalon = 0.08;
        const limitesCancha = { xMin: -0.95, xMax: 0.95, zMin: -1.45, zMax: 1.45 };

        // --- LÓGICA DEL BALÓN (Loop de juego) ---
        function sacarBalon() {
            ballPos.x = 0;
            ballPos.z = 0;
            // Elige un lado al azar y le da un pequeño impulso inicial hacia un jugador
            const lado = Math.random() > 0.5 ? 1 : -1;
            ballVel.x = (Math.random() - 0.5) * 0.02;
            ballVel.z = lado * 0.03;
        }

        function updatePhysics() {
            // Aplicar velocidad (fricción simulada)
            ballPos.x += ballVel.x;
            ballPos.z += ballVel.z;
            ballVel.x *= 0.98; 
            ballVel.z *= 0.98;

            // Colisiones con las paredes laterales (Eje X)
            if (ballPos.x < limitesCancha.xMin || ballPos.x > limitesCancha.xMax) {
                ballVel.x *= -1;
                ballPos.x = Math.max(limitesCancha.xMin, Math.min(ballPos.x, limitesCancha.xMax));
            }

            // Colisiones con las paredes del fondo o anotación de Gol (Eje Z)
            if (ballPos.z < limitesCancha.zMin) {
                // Verificar si es portería (Rango central de la portería en X)
                if (ballPos.x > -0.2 && ballPos.x < 0.2) {
                    score2++; // Gol del Jugador 2
                    document.getElementById('scoreP2').innerText = `Jugador 2: ${score2}`;
                    sacarBalon();
                } else {
                    ballVel.z *= -1;
                    ballPos.z = limitesCancha.zMin;
                }
            } else if (ballPos.z > limitesCancha.zMax) {
                if (ballPos.x > -0.2 && ballPos.x < 0.2) {
                    score1++; // Gol del Jugador 1
                    document.getElementById('scoreP1').innerText = `Jugador 1: ${score1}`;
                    sacarBalon();
                } else {
                    ballVel.z *= -1;
                    ballPos.z = limitesCancha.zMax;
                }
            }

            // Comprobar colisión simulada con los "dedos" de los jugadores
            detectarChoqueDedo(p1Visual, 1);
            detectarChoqueDedo(p2Visual, -1);

            // Actualizar posición en A-Frame
            balon.setAttribute('position', `${ballPos.x} 0.1 ${ballPos.z}`);
            requestAnimationFrame(updatePhysics);
        }

        function detectarChoqueDedo(dedoElement, direccionFuerza) {
            let posDedo = dedoElement.getAttribute('position');
            if(!posDedo) return;

            // Distancia bidimensional entre balón y dedo
            let dx = ballPos.x - posDedo.x;
            let dz = ballPos.z - posDedo.z;
            let distancia = Math.sqrt(dx*dx + dz*dz);

            if (distancia < 0.15) { // Si hay contacto cercano
                // Simula el "puntapié" usando el ángulo relativo del golpe
                let angulo = Math.atan2(dz, dx);
                ballVel.x = Math.cos(angulo) * 0.05;
                ballVel.z = Math.sin(angulo) * 0.05;
            }
        }

        // --- CONFIGURACIÓN DE MEDIAPIPE (RECONOCIMIENTO DE MANOS) ---
        const videoElement = document.getElementById('webcam');

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                results.multiHandLandmarks.forEach((landmarks, index) => {
                    // El landmark 8 pertenece a la punta del dedo índice
                    let indexFinger = landmarks[8]; 
                    
                    // Mapeo de coordenadas de pantalla a espacio de la cancha AR 3D
                    // Como el celular está en vista superior, X e Y de la cámara se vuelven X y Z de la cancha.
                    let mappedX = (indexFinger.x - 0.5) * 2; 
                    let mappedZ = (indexFinger.y - 0.5) * 3;

                    // Asignación según la posición en la pantalla (Jugador Izquierdo/Derecho o Arriba/Abajo)
                    if (indexFinger.y > 0.5) {
                        // Jugador 1 (Lado Sur de la cancha)
                        p1Visual.setAttribute('position', `${mappedX} 0.1 ${Math.max(0.2, mappedZ)}`);
                    } else {
                        // Jugador 2 (Lado Norte de la cancha)
                        p2Visual.setAttribute('position', `${mappedX} 0.1 ${Math.min(-0.2, mappedZ)}`);
                    }
                });
            }
        });

        // Iniciar cámara trasera automáticamente
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: { exact: "environment" } }
        }).then(stream => {
            videoElement.srcObject = stream;
            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                width: 640,
                height: 480
            });
            camera.start();
        }).catch(err => {
            console.error("Error al acceder a la cámara trasera: ", err);
            // Fallback a cualquier cámara disponible si falla el modo "environment"
            const camera = new Camera(videoElement, {
                onFrame: async () => { await hands.send({ image: videoElement }); },
                width: 640, height: 480
            });
            camera.start();
        });

        // Iniciar juego
        sacarBalon();
        updatePhysics();

    </script>
</body>
</html>
